<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">

  <title>Frontend Mentor | Social links profile</title>

  <style>
    .attribution {
      font-size: 11px;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
      text-decoration: none;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <img src="/assets/images/avatar-jessica.jpeg" alt="image-jessica">
      <h2>Jessica Randall</h2>
      <p class="locale">London, United Kingdom
      </p>
      <p class="description">"Front-end developer and avid reader."</p><br>
      <div class="grid">
        <a href="https://github.com" title="Go to Github" alt="Go to Github"><button
            class="button">GitHub</button></a><br>
        <a href="https://www.frontendmentor.io" title="Go to Frontend Mentor" alt="Go to Frontend Mentor"><button
            class="button">
            Frontend Mentor</button></a><br>
        <a href="https://www.linkedin.com" title="Go to LinkedIn" alt="Go to LinkeIn"><button class="button">
            LinkedIn</button></a><br>
        <a href="https://x.com" title="Go to Twitter/X" alt="Go to Twitter/X"><button class="button">
            Twitter</button></a><br>
        <a href="https://www.instagram.com" title="Go to Instagram" alt="Go to Instagram"><button class="button">
            Instagram</button></a><br>
      </div>
    </div>
    <div class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
      Coded by <a href="#">Shamuskado</a>.
    </div>
  </div>
</body>

</html>
